services:
  # backend:
  #   build: .
  #   expose:
  #     - "9000"
  #   env_file:
  #     - .env
  #   depends_on:
  #     - db
  #   restart: unless-stopped
  db:
    image: postgres:18-alpine
    container_name: api-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
